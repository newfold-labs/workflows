name: AI Code Review

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]

permissions:
  contents: read
  pull-requests: read

jobs:
  review:
    name: Review PR diff
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Review changed code with Cloudflare AI Gateway
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_GATEWAY_ID: github-actions-workflows
          CLOUDFLARE_AI_GATEWAY_TOKEN: ${{ secrets.CLOUDFLARE_AI_GATEWAY_TOKEN }}
          AI_REVIEW_MODEL: openai/gpt-5
        with:
          script: |
            const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
            const gatewayId = process.env.CLOUDFLARE_AI_GATEWAY_ID;
            const gatewayToken = process.env.CLOUDFLARE_AI_GATEWAY_TOKEN;
            const model = process.env.AI_REVIEW_MODEL || 'openai/gpt-5';

            if (!accountId) {
              core.setFailed('Missing required secret: CLOUDFLARE_ACCOUNT_ID');
              return;
            }

            if (!gatewayId || !gatewayToken) {
              core.setFailed('Set CLOUDFLARE_AI_GATEWAY_ID and CLOUDFLARE_AI_GATEWAY_TOKEN in your AI Gateway authentication setup.');
              return;
            }

            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const diffResponse = await github.request('GET /repos/{owner}/{repo}/pulls/{pull_number}', {
              owner,
              repo,
              pull_number,
              headers: {
                accept: 'application/vnd.github.v3.diff',
              },
            });

            const diff = String(diffResponse.data || '').slice(0, 120000);

            if (!diff.trim()) {
              core.info('No diff found to review.');
              return;
            }

            const prompt = [
              'Review this pull request diff.',
              'Return only valid JSON matching this exact shape:',
              '{"annotations":[{"path":"relative/file/path","line":123,"severity":"notice|warning|failure","title":"short title","message":"specific review comment"}]}',
              'Rules:',
              '- Only annotate changed lines that appear in the diff.',
              '- Prefer high-signal correctness, security, reliability, and test coverage issues.',
              '- Do not comment on style unless it can cause confusion or defects.',
              '- Use at most 20 annotations.',
              '- If there are no useful findings, return {"annotations":[]}.',
              '',
              diff,
            ].join('\n');

            const headers = {
              'content-type': 'application/json',
            };

            if (gatewayToken) {
              headers['cf-aig-authorization'] = `Bearer ${gatewayToken}`;
            }

            const response = await fetch(`https://gateway.ai.cloudflare.com/v1/${accountId}/${gatewayId}/compat/chat/completions`, {
              method: 'POST',
              headers,
              body: JSON.stringify({
                model,
                messages: [
                  {
                    role: 'system',
                    content: 'You are a careful senior engineer reviewing a GitHub pull request. You produce concise inline review annotations as JSON only.',
                  },
                  {
                    role: 'user',
                    content: prompt,
                  },
                ],
              }),
            });

            const responseText = await response.text();

            if (!response.ok) {
              core.setFailed(`AI Gateway request failed with ${response.status}: ${responseText}`);
              return;
            }

            let content;
            try {
              const completion = JSON.parse(responseText);
              content = completion.choices?.[0]?.message?.content || '';
            } catch (error) {
              core.setFailed(`Could not parse AI Gateway response JSON: ${error.message}`);
              return;
            }

            let review;
            try {
              review = JSON.parse(content.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, ''));
            } catch (error) {
              core.setFailed(`Model did not return valid review JSON: ${error.message}\n${content}`);
              return;
            }

            const annotations = Array.isArray(review.annotations) ? review.annotations.slice(0, 20) : [];

            if (annotations.length === 0) {
              core.info('AI review completed with no annotations.');
              return;
            }

            const escapeCommandValue = (value) =>
              String(value ?? '')
                .replace(/%/g, '%25')
                .replace(/\r/g, '%0D')
                .replace(/\n/g, '%0A');

            const escapeCommandProperty = (value) =>
              escapeCommandValue(value)
                .replace(/:/g, '%3A')
                .replace(/,/g, '%2C');

            const commandBySeverity = {
              notice: 'notice',
              warning: 'warning',
              failure: 'error',
            };

            for (const annotation of annotations) {
              const path = escapeCommandProperty(String(annotation.path || '').trim());
              const line = Number.parseInt(annotation.line, 10);
              const command = commandBySeverity[annotation.severity] || 'warning';
              const title = escapeCommandProperty(annotation.title || 'AI code review');
              const message = escapeCommandValue(annotation.message || '');

              if (!path || !Number.isInteger(line) || line < 1 || !message) {
                core.warning(`Skipping malformed annotation: ${JSON.stringify(annotation)}`);
                continue;
              }

              console.log(`::${command} file=${path},line=${line},title=${title}::${message}`);
            }
