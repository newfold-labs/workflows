name: Reusable - Dependabot Auto-Merge
on:
  workflow_call:
    inputs:
      merge-method:
        description: How to merge the PR. One of merge | squash | rebase.
        type: string
        default: merge

# Disable permissions for all available scopes by default.
# Any needed permissions should be configured individually for each job.
permissions: {}

jobs:
  # Approves the Dependabot PR and enables GitHub's native auto-merge.
  # Native auto-merge waits for branch-protection's required status checks to pass,
  # then merges the PR automatically. This job itself exits in seconds — it does not
  # poll or hold a runner while CI runs.
  auto-merge:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 5
    steps:
      - name: Validate merge-method input
        env:
          MERGE_METHOD: ${{ inputs.merge-method }}
        run: |
          case "$MERGE_METHOD" in
            merge|squash|rebase) ;;
            *) echo "::error::invalid merge-method '$MERGE_METHOD' (expected merge|squash|rebase)"; exit 1 ;;
          esac

      # Re-approves on every synchronize event so that repos configured to
      # "dismiss stale approvals on new commits" stay approved across Dependabot rebases.
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable native auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGE_METHOD: ${{ inputs.merge-method }}
        run: gh pr merge --auto "--$MERGE_METHOD" "$PR_URL"
